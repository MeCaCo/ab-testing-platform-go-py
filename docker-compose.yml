services:
  # 🐘 PostgreSQL - основное хранилище данных
  postgres:
    image: postgres:15
    container_name: ab_testing_db
    environment:
      POSTGRES_USER: ab_test
      POSTGRES_PASSWORD: ab_test_password
      POSTGRES_DB: ab_testing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ab_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🔴 Redis - кэш для Go-сервиса
  redis:
    image: redis:7-alpine
    container_name: ab_testing_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 🐍 Python API
  python-api:
    build: ./python
    container_name: ab_testing_python
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ab_test:ab_test_password@postgres:5432/ab_testing
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./python:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 🐹 Go Edge Service
  go-edge:
    build: ./go
    container_name: ab_testing_go_edge
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ab_test
      - DB_PASSWORD=ab_test_password
      - DB_NAME=ab_testing
      - REDIS_ADDR=redis:6379
      - REDIS_DB=0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./go:/app
    command: ./main

volumes:
  postgres_data:
  redis_data: